const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pw){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveBits"]);
  const bits=await crypto.subtle.deriveBits(
    {name:"PBKDF2",salt:b64(BLOB.salt),iterations:BLOB.iter,hash:"SHA-256"},base,256);
  const key=await crypto.subtle.importKey("raw",bits,"AES-GCM",false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(BLOB.iv)},key,b64(BLOB.ct));
  return new TextDecoder().decode(pt);
}

  const pw=document.getElementById("p").value;if(!pw)return;
  b.disabled=true;e.textContent="Decrypting…";
  try{
    const html=await unlock(pw);
    document.open("text/html");document.write(html);document.close();
  }catch(err){e.textContent="Incorrect password.";b.disabled=false;
    document.getElementById("p").select();}
});
